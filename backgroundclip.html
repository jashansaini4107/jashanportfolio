<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            font-family: sans-serif;
        }
        .image{
            height:80vh;
            justify-content: center;
            display: flex;
            align-items: center;
        }
        .background-clip{
            font-size: 400px;
            font-weight: 900;
            background: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSwxKkHh6HAcmQs43JfA9C5cIk-93bqoPxkxICNukQqsg&s=10);
            background-position-y: -90px;
            background-size: cover;
            background-repeat: no-repeat;
            background-clip: text;
            color:transparent;
        }

    </style>
</head>
<body>
    <div class="image">
    <div class="background-clip">BMW</div>
    </div>
</body>
</html>
