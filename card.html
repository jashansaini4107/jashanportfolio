<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
      }
      body {
        justify-content: center;
        display: flex;
        align-items: center;
        height: 100vh;
      }
      .card-cover {
        border-radius: 10px;
        border: 1px solid black;
        border-color: black;
        overflow: hidden;
      }
      .card-img {
        width: 400px;
      }
      .content {
        padding: 10px 20px;
        gap: 30px;
      }
    </style>
  </head>
  <body>
    
    <div class="card-cover">
      <img
        src="https://images.unsplash.com/photo-1552066344-2464c1135c32?q=80&w=2070&auto=format&fit=crop&ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
        class="card-img"
      />
      <div class="content">
        <div class="Brand">Air Jordan</div>
        <div class="discription">This is best shoe.</div>
        <div style="display: flex; justify-content: space-between;">
          <div class="price">$7999</div>
          <div>+</div>
        </div>
      </div>
    </div>
  </body>
</html>
