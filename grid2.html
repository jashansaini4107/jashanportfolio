<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
        }
        .boxes{
            margin:0 auto;
            display:grid;
            grid-template-columns: repeat(10,1fr);
            height:400px;
            width:900px;
            gap:5px;
        }
        .box{ 
            background-color: red;
            border:5px solid white;
            
        }
        .colum-span-1{
            grid-column: span 4 / span 4;
        }

        .colum-span-2{
            grid-column: span 2 /span 2;
        }
       .colum-span-3{
        grid-column: span 4 / span 4;
       }
       .row-span-1{
        grid-row: span 2 / span 2;
       }
        .colum-span-4{
            grid-column: span 3 / span 3;
        }
        
       
    </style>
</head>
<body>
    <div class="boxes">
    <div class="box colum-span-1">1</div>
    <div class="box colum-span-1">2</div>
    <div class="box colum-span-2">3</div>
    <div class="box colum-span-3 row-span-1">4</div>
    <div class="box colum-span-4 row-span-1">5</div>
    <div class="box">6</div>
    <div class="box colum-span-2">7</div>
    <div class="box colum-span-4">8</div>
    </div>
</body>
</html>
