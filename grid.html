<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin:0;
            
        }
        .parent{
            display: grid;
            grid-template-columns:repeat(3,33%);
            height:400px;
            gap:5px;
            width:900px;
            
            
        }
        .child{
            background-color: red;
            border:5px solid white;
            

        }
        .row-span-2{
            grid-row: span 2 / span 2;
        }
    </style>
</head>
<body>
    <div class="parent">
        <div class="child"></div>
        <div class="child  row-span-2"></div>
        <div class="child"></div>
        <div class="child"></div>
        <div class="child"></div>
        
    </div>
</body>
</html>
